<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="#7c3aed"/>

  <!-- Gem body -->
  <!-- Crown top (table): x 11→21 at y=5  |  Girdle: x 4→28 at y=13  |  Pavilion tip: x=16 y=27 -->
  <path d="M11 5h10l7 8-12 14L4 13l7-8z"
        fill="white" fill-opacity="0.93"
        stroke="white" stroke-width="0.4" stroke-linejoin="round"/>

  <!-- Crown facet lines (table corners + centre → girdle centre) -->
  <path d="M11 5L16 13M21 5L16 13M16 5L16 13"
        stroke="#6d28d9" stroke-width="1.1" stroke-linecap="round" stroke-opacity="0.5"/>

  <!-- Girdle horizontal line -->
  <line x1="4" y1="13" x2="28" y2="13"
        stroke="#6d28d9" stroke-width="1.1" stroke-opacity="0.45"/>

  <!-- Pavilion centre line -->
  <line x1="16" y1="13" x2="16" y2="27"
        stroke="#6d28d9" stroke-width="1.1" stroke-linecap="round" stroke-opacity="0.5"/>

  <!-- Upper-left shine facet (gem catching light) -->
  <path d="M11 5L4 13L7.5 9Z" fill="white" fill-opacity="0.32"/>
</svg>
