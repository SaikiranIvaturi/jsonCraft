        <h2>Frequently Asked Questions</h2>

        <h3>How do I format JSON online for free?</h3>
        <p>Go to <a href="https://jsoncraft.in/">jsoncraft.in</a>, paste or type your JSON and click <strong>Format</strong> (or press <kbd>Ctrl+Shift+F</kbd>). JSONCraft prettifies your JSON instantly with proper indentation. No signup, no limit.</p>

        <h3>How do I validate JSON?</h3>
        <p>JSONCraft validates your JSON in real time as you type. Syntax errors are underlined at the exact line and column. The status bar at the bottom shows <em>Valid JSON</em> or the specific error message.</p>

        <h3>How do I convert JSON to TypeScript interfaces?</h3>
        <p>Click <strong>Convert → JSON → TypeScript</strong>. Paste your JSON object or array and TypeScript interfaces are generated instantly. Optional fields are inferred when array items have different shapes.</p>

        <h3>How do I convert JSON to YAML?</h3>
        <p>Click <strong>Convert → JSON ↔ YAML</strong>. Paste JSON on the left, get YAML on the right. Switch direction to convert YAML back to JSON. Works with complex nested structures.</p>

        <h3>How do I convert JSON to CSV?</h3>
        <p>Click <strong>Convert → JSON ↔ CSV</strong>. Paste a JSON array of objects and get a CSV you can open in Excel or Google Sheets. Nested objects are flattened as <code>parent.child</code> column names.</p>

        <h3>What is JSONPath?</h3>
        <p>JSONPath is a query language for extracting data from JSON, similar to XPath for XML. Example: <code>$.store.books[?(@.price &lt; 10)].title</code> selects titles of books under $10. Use the JSONPath Playground on JSONCraft to test expressions interactively.</p>

        <h3>How do I generate a JSON Schema?</h3>
        <p>Click <strong>Convert → JSON Schema</strong>. Paste your JSON and a JSON Schema Draft 7 definition is inferred automatically — including required fields, property types and nested object structures.</p>

        <h3>How do I compare two JSON files?</h3>
        <p>Click the <strong>Diff</strong> tab. Paste the first JSON on the left and the second on the right. Differences are highlighted and listed with path, old value and new value.</p>

        <h3>Is JSONCraft free? Does it send my data anywhere?</h3>
        <p>JSONCraft is 100% free — no account, no API key, no rate limits. It is fully privacy-first: all processing runs in your browser. Your JSON is never sent to any server.</p>
