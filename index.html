<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>JSONCraft — Free JSON Formatter, Validator &amp; Diff Tool</title>
    <meta name="description" content="Free online JSON formatter, validator, diff tool, tree explorer and minifier. No signup. Privacy-first — everything runs in your browser, nothing is sent to a server." />

    <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large" />
    <link rel="canonical" href="https://jsoncraft.in/" />

    <!-- Favicon & icons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#8b5cf6" />
    <meta name="application-name" content="JSONCraft" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />

    <meta property="og:image" content="https://jsoncraft.in/og-image.png" />

    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="JSONCraft — JSON toolkit for developers" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="JSONCraft — Free JSON Formatter, Validator &amp; Diff Tool" />
    <meta name="twitter:description" content="Free online JSON formatter, validator, diff tool, tree explorer and minifier. Privacy-first — runs entirely in your browser." />
    <meta name="twitter:image" content="https://jsoncraft.in/og-image.png" />
    <meta name="twitter:image:alt" content="JSONCraft — JSON toolkit for developers" />

    <!-- Structured data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "JSONCraft",
      "url": "https://jsoncraft.in/",
      "description": "Free online JSON formatter, validator, diff tool, tree explorer and minifier. Privacy-first — everything runs in your browser.",
      "applicationCategory": "DeveloperApplication",
      "operatingSystem": "Any",
      "browserRequirements": "Requires a modern browser with JavaScript enabled",
      "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" },
      "featureList": [
        "JSON Formatter and Beautifier",
        "JSON Validator with line-level error reporting",
        "JSON Diff and Compare",
        "JSON Tree Explorer",
        "JSON Minifier",
        "JSON Analyzer",
        "Multi-tab workspaces",
        "Drag and drop file upload",
        "Share via URL"
      ],
      "creator": {
        "@type": "Person",
        "name": "Ivaturi Sai Kiran",
        "url": "https://cv-portfolio-orpin.vercel.app/"
      }
    }
    </script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet" />

    <!-- Inline theme script — runs before first paint to prevent flash -->
    <script>
      (function () {
        var theme = localStorage.getItem("json-craft-theme") || "dark";
        document.documentElement.classList.toggle("dark", theme === "dark");
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
