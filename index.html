  <body>
    <div id="root">
      <!--
        Static content for search crawlers that don't execute JavaScript.
        This is replaced by the React app on load.
      -->
      <noscript>
        <style>
          body { font-family: system-ui, sans-serif; max-width: 800px; margin: 0 auto; padding: 2rem; }
          h1 { font-size: 1.75rem; }
          h2 { font-size: 1.25rem; margin-top: 2rem; }
          ul { line-height: 2; }
        </style>
        <h1>JSONCraft — Free JSON Tools for Developers</h1>
        <p>
          JSONCraft is a free, privacy-first online JSON toolkit. Format, validate, diff and explore JSON.
          Convert JSON to TypeScript interfaces, YAML, CSV and JSON Schema.
          Run JSONPath queries. No signup required — everything runs entirely in your browser.
        </p>

        <h2>JSON Formatter &amp; Validator</h2>
        <p>Paste or type JSON and instantly format it with 2- or 4-space indentation. Real-time validation highlights syntax errors at the exact line. Sort keys alphabetically, minify to reduce size, or beautify minified JSON.</p>

        <h2>JSON to TypeScript Interface Generator</h2>
        <p>Paste a JSON object or array and get clean TypeScript interfaces instantly. Handles nested objects, arrays with union types, and optional fields inferred from mixed arrays — similar to quicktype but right in your browser.</p>

        <h2>JSONPath Playground</h2>
        <p>Write JSONPath expressions like <code>$.users[?(@.age &gt; 30)].email</code> and see the matching values highlighted in real time. Supports the full JSONPath spec via jsonpath-plus.</p>

        <h2>JSON to YAML Converter</h2>
        <p>Convert JSON to YAML or YAML to JSON instantly. Useful for Kubernetes configs, Docker Compose, GitHub Actions workflows and other DevOps tooling.</p>

        <h2>JSON to CSV Converter</h2>
        <p>Convert a JSON array of objects to CSV for spreadsheet import. Nested objects are flattened with dot notation. Reverse direction converts CSV back to a JSON array with automatic type inference.</p>

        <h2>JSON Schema Inference</h2>
        <p>Paste a JSON document and instantly get a JSON Schema Draft 7 definition. Required fields, types, and nested structures are detected automatically.</p>

        <h2>JSON Diff &amp; Compare</h2>
        <p>Paste two JSON documents and see additions, deletions and modifications highlighted side by side. A changes summary lists every difference with path, old value and new value.</p>

        <h2>JSON Tree Explorer</h2>
        <p>Browse large JSON documents as a collapsible tree. Click any node to copy its JSONPath. Handles deeply nested objects and arrays with thousands of nodes.</p>

        <h2>JSON Analyzer</h2>
        <p>Analyze your JSON document's structure: total node count, max depth, type distribution, most common keys, array statistics and empty/null value counts.</p>

        <h2>Features</h2>
        <ul>
          <li>100% free — no account, no API key, no rate limits</li>
          <li>Privacy-first — your JSON never leaves your device</li>
          <li>Works offline after first load</li>
          <li>Multi-tab workspaces — work on multiple JSONs at once</li>
          <li>Drag and drop file upload (.json, .txt, .log)</li>
          <li>Share JSON via URL — encode your document in a shareable link</li>
          <li>Command palette (Ctrl+K / ⌘K) for keyboard-driven workflow</li>
          <li>Dark and light mode</li>
        </ul>
